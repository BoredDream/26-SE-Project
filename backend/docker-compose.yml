version: '3.8'

services:
  backend:
    build: .
    container_name: campus-flower-backend
    ports:
      - "6000:6000"
    environment:
      - PORT=6000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=campus_flower
      - DB_USER=root
      - DB_PASSWORD=root_password
      - REDIS_URL=redis://redis:6379
      - WX_APPID=wx1234567890abcdef
      - WX_SECRET=xxxxxxxxxxxxxxxx
      - COS_SECRET_ID=AKIDxxxxxxx
      - COS_SECRET_KEY=xxxxxxx
      - COS_BUCKET=flower-1234567890
      - COS_REGION=ap-guangzhou
      - JWT_SECRET=xxxxxxxxxxxxxxxx
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: campus-flower-mysql
    ports:
      - "3340:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=campus_flower
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: campus-flower-redis
    ports:
      - "6490:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data: