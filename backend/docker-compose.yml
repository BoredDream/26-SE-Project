version: '3.8'

services:
  # MySQL服务
  mysql:
    image: mysql:5.7
    container_name: flower_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: campus_flower
      MYSQL_INITDB_ARGS: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--init-connect=SET NAMES utf8mb4", "--skip-character-set-client-handshake"]
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - flower_network

  # Redis服务
  redis:
    image: redis:7.0
    container_name: flower_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - flower_network

  # Node.js应用
  node-app:
    build: .
    container_name: flower_node
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    networks:
      - flower_network

  # Nginx服务
  nginx:
    image: nginx:alpine
    container_name: flower_nginx
    restart: always
    depends_on:
      - node-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - flower_network

# 数据卷
volumes:
  mysql_data:
  redis_data:

# 网络配置
networks:
  flower_network:
    driver: bridge
