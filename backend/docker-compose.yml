version: '3.8'

services:
  backend:
    build: .
    container_name: campus-flower-backend
    ports:
      - "6000:8080"
    environment:
      - server.port=8080
      - spring.datasource.url=jdbc:mysql://mysql:3306/campus_flower?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - spring.datasource.username=campus
      - spring.datasource.password=campus
      - spring.redis.host=redis
      - spring.redis.port=6379
      - wx.appid=wx1234567890abcdef
      - wx.secret=xxxxxxxxxxxxxxxx
      - cos.secret-id=AKIDxxxxxxx
      - cos.secret-key=xxxxxxx
      - cos.bucket=flower-1234567890
      - cos.region=ap-guangzhou
      - jwt.secret=xxxxxxxxxxxxxxxx
      - jwt.expiration=86400000
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: campus-flower-mysql
    ports:
      - "3340:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=campus_flower
      - MYSQL_USER=campus
      - MYSQL_PASSWORD=campus
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: campus-flower-redis
    ports:
      - "6490:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data: