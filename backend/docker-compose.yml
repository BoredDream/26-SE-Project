version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: flower_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_flower
      MYSQL_USER: flower_user
      MYSQL_PASSWORD: flower_pass123
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--init-connect=SET NAMES utf8mb4", "--skip-character-set-client-handshake"]
    networks:
      - flower_network

  redis:
    image: redis:7.0
    container_name: flower_redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - flower_network

  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flower_node
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: campus_flower
      DB_USER: flower_user
      DB_PASSWORD: flower_pass123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your_jwt_secret_key
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
    networks:
      - flower_network

  nginx:
    image: nginx:alpine
    container_name: flower_nginx
    restart: always
    depends_on:
      - node-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./test-frontend:/app/test-frontend:ro
    networks:
      - flower_network

# 数据卷
volumes:
  mysql_data:
  redis_data:

# 网络配置
networks:
  flower_network:
    driver: bridge
