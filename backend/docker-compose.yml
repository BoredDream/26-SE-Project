services:
  # 后端服务
  backend:
    build: .
    container_name: campus-flower-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=campus_flower
      - DB_USER=root
      - DB_PASSWORD=123456
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=campus_flower_jwt_secret_key_2026
      - GPS_VALIDATION_RADIUS=150
      - CHECKIN_COOLDOWN_HOURS=24
    depends_on:
      - mysql
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env
    networks:
      - campus-flower-network

  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: campus-flower-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=campus_flower
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - campus-flower-network
    command: --default-authentication-plugin=mysql_native_password

  # Redis缓存服务
  redis:
    image: redis:7.0-alpine
    container_name: campus-flower-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - campus-flower-network

# 数据卷
volumes:
  mysql-data:
  redis-data:

# 网络
networks:
  campus-flower-network:
    driver: bridge