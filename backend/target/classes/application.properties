# 服务配置
server.port=6000
spring.application.name=backend

# 数据库配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3340/campus_flower?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=campus
spring.datasource.password=campus
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# 安全配置
spring.security.user.name=admin
spring.security.user.password=admin

# JWT配置
jwt.secret=xxxxxxxxxxxxxxxx
jwt.expiration=86400000

# 微信小程序配置
wx.appid=wx1234567890abcdef
wx.secret=xxxxxxxxxxxxxxxx

# 腾讯云COS配置
cos.secret-id=AKIDxxxxxxx
cos.secret-key=xxxxxxx
cos.bucket=flower-1234567890
cos.region=ap-guangzhou

# Redis配置
spring.redis.host=127.0.0.1
spring.redis.port=6490

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS配置
cors.allowed-origins=*

# 日志配置
logging.level.org.springframework=INFO
logging.level.com.example.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n